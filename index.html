<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <!-- Cegah cache browser lama -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Loader konfigurasi: ambil dari Netlify Function (production) atau env.js (local dev) -->
  <script>
    window.__configReady = (async function () {
      // Cek apakah sudah di-inject oleh env.js (local dev)
      const alreadySet =
        window.SUPABASE_URL && window.SUPABASE_URL.startsWith('https://') &&
        !window.SUPABASE_URL.includes('YOUR_PROJECT_ID');

      if (!alreadySet) {
        // Di Netlify: ambil dari serverless function (aman, tidak ada di kode)
        try {
          const r = await fetch('/.netlify/functions/env-config');
          if (r.ok) {
            const cfg = await r.json();
            window.SUPABASE_URL      = cfg.url;
            window.SUPABASE_ANON_KEY = cfg.key;
          }
        } catch (e) {
          console.warn('[Config] Netlify function tidak tersedia, coba env.js manual.');
        }
      }
    })();
  </script>
  <!-- env.js hanya ada di lokal (di-gitignore). Di Netlify file ini kosong/tidak ada. -->
  <script src="env.js?v=20260405" onerror="void 0"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a6b4a">
  <meta name="description" content="Kasir Sinar Jaya — Sistem Kasir Toko Sembako & Kelontong">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="logo.jpg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* 6 tab nav override */

      grid-template-columns: repeat(6, 1fr) !important;

    .nav-icon {

</head>

      </button>

    </nav>
  </div>

  <div id="modal-container"></div>

  <!-- app.js dimuat setelah config selesai -->
  <script>
    window.__configReady.then(() => {
      const s = document.createElement('script');
      s.type  = 'module';
      s.src   = 'app.js?v=20260406';
      document.body.appendChild(s);
    });
  </script>
</body>

</html>
