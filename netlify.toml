[build]
  publish = "."

# ===== Functions =====
[functions]
  directory = "netlify/functions"

# ===== Headers Security =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ===== Jangan cache env.js (kalau masih ada, nilainya kosong) =====
[[headers]]
  for = "/env.js"
  [headers.values]
    Cache-Control = "no-store"

# ===== SPA routing: semua path → index.html =====
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
  force  = false

# ============================================================
# ENVIRONMENT VARIABLES — WAJIB diisi di Netlify Dashboard:
#   Site settings → Environment variables:
#     SUPABASE_URL      = https://xxxxxxxx.supabase.co
#     SUPABASE_ANON_KEY = sb_publishable_xxxx...
# ============================================================
